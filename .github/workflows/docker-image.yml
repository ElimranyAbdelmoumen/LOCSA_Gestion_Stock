name: Deploy with Docker Compose

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract repo lowercase
        id: repo
        run: echo "repo=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Build backend image
        run: |
          docker build -t ghcr.io/${{ steps.repo.outputs.repo }}/backend:latest ./backend

      - name: Build frontend image
        run: |
          docker build -t ghcr.io/${{ steps.repo.outputs.repo }}/frontend:latest ./frontend

      - name: Push backend image
        run: |
          docker push ghcr.io/${{ steps.repo.outputs.repo }}/backend:latest

      - name: Push frontend image
        run: |
          docker push ghcr.io/${{ steps.repo.outputs.repo }}/frontend:latest

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /docker/traefik
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker compose pull
            docker compose up -d
            docker image prune -f
