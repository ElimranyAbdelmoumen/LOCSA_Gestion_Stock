version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: locsa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-locsa_db}
      POSTGRES_USER: ${POSTGRES_USER:-locsa_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-locsa_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-locsa_user} -d ${POSTGRES_DB:-locsa_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE}
    container_name: locsa_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-locsa_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-locsa_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-locsa_password}
      JWT_SECRET: locsaSarl2024SecretKeyForJWTTokenGenerationMustBe256BitsLong
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: locsa_frontend
    restart: unless-stopped
    ports:
      - "80:82"
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
